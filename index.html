<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCaptcha Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 450px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .stage-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stage-text {
            font-weight: bold;
            color: #555;
        }

        .health-bar-container {
            width: 150px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: all 0.3s ease;
            width: 100%;
        }

        .health-bar.warning {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
        }

        .health-bar.danger {
            background: linear-gradient(90deg, #f87171, #ef4444);
        }

        .instruction {
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }

        .instruction p {
            color: #0369a1;
            font-size: 14px;
            line-height: 1.5;
        }

        .instruction strong {
            color: #0c4a6e;
        }

        .captcha-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            background: #333;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            margin-bottom: 20px;
        }

        .captcha-cell {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #fff;
            transition: transform 0.1s ease;
        }

        .captcha-cell:hover {
            transform: scale(1.02);
            z-index: 1;
        }

        .captcha-cell img {
            width: 300%;
            height: 300%;
            object-fit: cover;
            pointer-events: none;
        }

        .captcha-cell.selected {
            outline: 4px solid #3b82f6;
            outline-offset: -4px;
        }

        .captcha-cell.correct {
            outline: 4px solid #22c55e !important;
            outline-offset: -4px;
        }

        .captcha-cell.wrong {
            outline: 4px solid #ef4444 !important;
            outline-offset: -4px;
        }

        .verify-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .verify-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .verify-btn .checkbox {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 18px;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .feedback.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .feedback.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .game-over {
            text-align: center;
            padding: 40px 20px;
        }

        .game-over h2 {
            color: #ef4444;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #666;
            margin-bottom: 25px;
            font-size: 18px;
        }

        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="loading-screen" class="loading">
            <div class="spinner"></div>
            <p>이미지를 불러오는 중...</p>
        </div>

        <div id="game-screen" class="hidden">
            <div class="header">
                <h1>🔍 reCaptcha Game</h1>
                <div class="stage-info">
                    <span class="stage-text">Stage <span id="stage-num">1</span></span>
                    <div class="health-bar-container">
                        <div id="health-bar" class="health-bar"></div>
                    </div>
                </div>
            </div>

            <div class="instruction">
                <p><strong id="category-text">"자동차"</strong>를 포함하는 모든 사각형을 선택하세요.</p>
            </div>

            <div id="captcha-grid" class="captcha-grid">
                <!-- Cells will be generated by JavaScript -->
            </div>

            <button id="verify-btn" class="verify-btn" disabled>
                <span class="checkbox">☐</span>
                <span>확인</span>
            </button>

            <div id="feedback" class="feedback"></div>
        </div>

        <div id="game-over-screen" class="hidden game-over">
            <h2>💀 게임 오버!</h2>
            <p>최종 도달 스테이지: <strong id="final-stage">1</strong></p>
            <button class="restart-btn" onclick="restartGame()">다시 시작</button>
        </div>
    </div>

    <script>
        // Unsplash 이미지 URL 목록 (거리, 사물 중심 20 개)
        const imageUrls = [
            // 자동차
            'https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?w=600&q=80',
            'https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=600&q=80',
            'https://images.unsplash.com/photo-1550355291-bbee04a92027?w=600&q=80',
            'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600&q=80',
            'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=600&q=80',
            
            // 신호등/거리
            'https://images.unsplash.com/photo-1577563908411-5077b6dc7624?w=600&q=80',
            'https://images.unsplash.com/photo-1496568816309-51d7c20e3b21?w=600&q=80',
            'https://images.unsplash.com/photo-1565551928456-03bf0cce0c2d?w=600&q=80',
            'https://images.unsplash.com/photo-1517524008697-84bbe3c3fd98?w=600&q=80',
            'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80',
            
            // 자전거/오토바이
            'https://images.unsplash.com/photo-1532298229144-0ec0c57515c7?w=600&q=80',
            'https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=600&q=80',
            'https://images.unsplash.com/photo-1571333250630-f0230c320b6d?w=600&q=80',
            'https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?w=600&q=80',
            'https://images.unsplash.com/photo-1511994298220-4127630aa68b?w=600&q=80',
            
            // 건물/상점/간판
            'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=600&q=80',
            'https://images.unsplash.com/photo-1560518883-ce633abb8e96?w=600&q=80',
            'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600&q=80',
            'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=600&q=80',
            'https://images.unsplash.com/photo-1559563362-c69ed7aa59f6?w=600&q=80'
        ];

        // 카테고리 정의
        const categories = [
            { name: '자동차', keyword: 'car', emoji: '🚗' },
            { name: '신호등', keyword: 'traffic light', emoji: '🚦' },
            { name: '자전거', keyword: 'bicycle', emoji: '🚲' },
            { name: '건물', keyword: 'building', emoji: '🏢' }
        ];

        let currentStage = 1;
        let health = 100;
        let currentImageIndex = 0;
        let selectedCells = [];
        let correctCells = [];
        let preloadedImages = [];
        let gameActive = true;

        // DOM 요소들
        const loadingScreen = document.getElementById('loading-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const stageNumEl = document.getElementById('stage-num');
        const healthBarEl = document.getElementById('health-bar');
        const categoryTextEl = document.getElementById('category-text');
        const captchaGridEl = document.getElementById('captcha-grid');
        const verifyBtn = document.getElementById('verify-btn');
        const feedbackEl = document.getElementById('feedback');
        const finalStageEl = document.getElementById('final-stage');

        // 이미지 프리로드
        async function preloadImages() {
            const promises = imageUrls.map(url => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(url);
                    img.src = url;
                });
            });

            try {
                preloadedImages = await Promise.all(promises);
                console.log('모든 이미지 로드 완료:', preloadedImages.length);
                startGame();
            } catch (error) {
                console.error('이미지 로드 실패:', error);
                alert('이미지를 불러오는데 실패했습니다. 페이지를 새로고침 해주세요.');
            }
        }

        // 게임 시작
        function startGame() {
            loadingScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            currentStage = 1;
            health = 100;
            gameActive = true;
            updateHealthBar();
            loadNewStage();
        }

        // 새 스테이지 로드
        function loadNewStage() {
            selectedCells = [];
            correctCells = [];
            verifyBtn.disabled = true;
            verifyBtn.querySelector('.checkbox').textContent = '☐';
            feedbackEl.className = 'feedback';
            feedbackEl.textContent = '';

            stageNumEl.textContent = currentStage;

            // 랜덤 이미지 선택 (이전과 다른 것)
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * preloadedImages.length);
            } while (newIndex === currentImageIndex && preloadedImages.length > 1);
            currentImageIndex = newIndex;

            // 랜덤 카테고리 선택
            const category = categories[Math.floor(Math.random() * categories.length)];
            categoryTextEl.innerHTML = `${category.emoji} "${category.name}"`;

            // 정답 셀 결정 (1~3 개)
            const numCorrect = Math.floor(Math.random() * 3) + 1;
            const cellIndices = [0, 1, 2, 3, 4, 5, 6, 7, 8];
            
            // Fisher-Yates 셔플
            for (let i = cellIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cellIndices[i], cellIndices[j]] = [cellIndices[j], cellIndices[i]];
            }
            
            correctCells = cellIndices.slice(0, numCorrect).sort((a, b) => a - b);

            // 그리드 생성
            createGrid(preloadedImages[currentImageIndex]);
        }

        // 그리드 생성
        function createGrid(img) {
            captchaGridEl.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'captcha-cell';
                cell.dataset.index = i;

                const cellImg = document.createElement('img');
                cellImg.src = img.src;

                // 각 셀의 위치 계산 (3x3 그리드)
                const row = Math.floor(i / 3);
                const col = i % 3;

                // objectPosition 으로 이미지 영역 조정
                const posX = col * 50;
                const posY = row * 50;
                cellImg.style.objectPosition = `${posX}% ${posY}%`;

                cell.appendChild(cellImg);
                cell.addEventListener('click', () => toggleCell(cell, i));
                
                captchaGridEl.appendChild(cell);
            }
        }

        // 셀 토글
        function toggleCell(cell, index) {
            if (!gameActive) return;

            const selectedIndex = selectedCells.indexOf(index);
            
            if (selectedIndex === -1) {
                selectedCells.push(index);
                cell.classList.add('selected');
            } else {
                selectedCells.splice(selectedIndex, 1);
                cell.classList.remove('selected');
            }

            verifyBtn.disabled = selectedCells.length === 0;
            verifyBtn.querySelector('.checkbox').textContent = selectedCells.length > 0 ? '✓' : '☐';
        }

        // 확인 버튼 클릭
        verifyBtn.addEventListener('click', () => {
            if (!gameActive || selectedCells.length === 0) return;

            verifyAnswer();
        });

        // 정답 확인
        function verifyAnswer() {
            const cells = document.querySelectorAll('.captcha-cell');
            
            // 모든 셀 초기화
            cells.forEach(cell => {
                cell.classList.remove('selected', 'correct', 'wrong');
            });

            // 정답/오답 표시
            let wrongSelections = 0;
            let missedCorrect = 0;

            // 선택한 셀들 확인
            selectedCells.forEach(index => {
                const cell = cells[index];
                if (correctCells.includes(index)) {
                    cell.classList.add('correct');
                } else {
                    cell.classList.add('wrong');
                    wrongSelections++;
                }
            });

            // 놓친 정답 확인
            correctCells.forEach(index => {
                if (!selectedCells.includes(index)) {
                    missedCorrect++;
                }
            });

            // 정답 셀도 초록색으로 표시 (선택되지 않았더라도)
            correctCells.forEach(index => {
                const cell = cells[index];
                if (!cell.classList.contains('wrong')) {
                    cell.classList.add('correct');
                }
            });

            // 피해 계산
            const totalErrors = wrongSelections + missedCorrect;
            const damage = totalErrors * 15;
            
            if (totalErrors > 0) {
                health -= damage;
                if (health < 0) health = 0;
                updateHealthBar();

                feedbackEl.className = 'feedback error';
                feedbackEl.textContent = `❌ 오답 ${totalErrors}개! 체력 -${damage}%`;
            } else {
                feedbackEl.className = 'feedback success';
                feedbackEl.textContent = '✅ 정답입니다! 다음 스테이지로 이동합니다.';
            }

            // 게임 오버 체크
            if (health <= 0) {
                gameActive = false;
                setTimeout(() => {
                    showGameOver();
                }, 1500);
            } else if (totalErrors === 0) {
                // 정답 시 다음 스테이지로
                gameActive = false;
                setTimeout(() => {
                    currentStage++;
                    gameActive = true;
                    loadNewStage();
                }, 1500);
            } else {
                // 오답이지만 계속 플레이
                setTimeout(() => {
                    selectedCells = [];
                    verifyBtn.disabled = true;
                    verifyBtn.querySelector('.checkbox').textContent = '☐';
                    feedbackEl.className = 'feedback';
                    feedbackEl.textContent = '';
                    
                    cells.forEach(cell => {
                        cell.classList.remove('correct', 'wrong');
                    });
                }, 1500);
            }
        }

        // 체력바 업데이트
        function updateHealthBar() {
            healthBarEl.style.width = `${health}%`;
            
            healthBarEl.classList.remove('warning', 'danger');
            
            if (health <= 30) {
                healthBarEl.classList.add('danger');
            } else if (health <= 60) {
                healthBarEl.classList.add('warning');
            }
        }

        // 게임 오버 표시
        function showGameOver() {
            gameScreen.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            finalStageEl.textContent = currentStage;
        }

        // 게임 재시작
        function restartGame() {
            gameOverScreen.classList.add('hidden');
            startGame();
        }

        // 게임 시작 (이미지 로드 후)
        preloadImages();
    </script>
</body>
</html>
