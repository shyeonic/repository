<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCaptcha Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .health-bar-container {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .stage-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .instruction {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            color: #4a5568;
            font-weight: 500;
        }

        .captcha-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 20px;
            aspect-ratio: 1;
        }

        .grid-cell {
            background: #ddd;
            border: 3px solid #bbb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            position: relative;
        }

        .grid-cell:hover {
            border-color: #667eea;
            transform: scale(1.02);
        }

        .grid-cell.selected {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
        }

        .grid-cell.correct {
            border-color: #48bb78;
            background: rgba(72, 187, 120, 0.3);
        }

        .grid-cell.wrong {
            border-color: #f56565;
            background: rgba(245, 101, 101, 0.3);
        }

        .cell-content {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .feedback {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        .feedback.success {
            background: #c6f6d5;
            color: #276749;
            display: block;
        }

        .feedback.error {
            background: #fed7d7;
            color: #c53030;
            display: block;
        }

        .game-over {
            text-align: center;
            display: none;
        }

        .game-over h2 {
            color: #e53e3e;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #666;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔐 reCaptcha Game</h1>
            <div class="health-bar-container">
                <div class="health-bar" id="healthBar"></div>
            </div>
            <div class="stage-info">
                <span>Stage: <strong id="stageNum">1</strong></span>
                <span>Health: <strong id="healthNum">100</strong>%</span>
            </div>
        </div>

        <div id="gameArea">
            <div class="instruction" id="instruction">
                🔍 "자동차"가 있는 칸을 모두 선택하세요!
            </div>

            <div class="captcha-grid" id="captchaGrid"></div>

            <button class="btn btn-primary" id="verifyBtn" onclick="verifySelection()">
                확인 (Verify)
            </button>

            <div class="feedback" id="feedback"></div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>💀 게임 오버!</h2>
            <p>도착한 스테이지: <span id="finalStage">1</span></p>
            <button class="btn btn-primary" onclick="restartGame()">다시 시작</button>
        </div>
    </div>

    <script>
        // 게임 상태
        let gameState = {
            stage: 1,
            health: 100,
            targetCategory: '',
            correctCells: [],
            selectedCells: [],
            gridSize: 3,
            isProcessing: false
        };

        // 카테고리 및 이미지 소스
        const categories = [
            { name: '자동차', emoji: '🚗', colors: ['#e74c3c', '#3498db', '#2ecc71'] },
            { name: '나무', emoji: '🌳', colors: ['#27ae60', '#229954', '#1e8449'] },
            { name: '신호등', emoji: '🚦', colors: ['#e74c3c', '#f1c40f', '#2ecc71'] },
            { name: '자전거', emoji: '🚲', colors: ['#34495e', '#7f8c8d', '#95a5a6'] },
            { name: '꽃', emoji: '🌸', colors: ['#ff69b4', '#ff1493', '#c71585'] },
            { name: '구름', emoji: '☁️', colors: ['#ecf0f1', '#bdc3c7', '#95a5a6'] },
            { name: '집', emoji: '🏠', colors: ['#d35400', '#e67e22', '#f39c12'] },
            { name: '별', emoji: '⭐', colors: ['#f1c40f', '#f39c12', '#e67e22'] }
        ];

        // 캔버스를 사용하여 동적으로 이미지 생성
        function generateCellImage(category, seed) {
            const canvas = document.createElement('canvas');
            canvas.width = 100;
            canvas.height = 100;
            const ctx = canvas.getContext('2d');

            // 배경색 (무작위 그라데이션)
            const gradient = ctx.createLinearGradient(0, 0, 100, 100);
            const baseColor = category.colors[Math.floor(Math.random() * category.colors.length)];
            gradient.addColorStop(0, baseColor);
            gradient.addColorStop(1, '#ffffff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 100, 100);

            // 노이즈 추가 (텍스처 효과)
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.1)`;
                ctx.fillRect(Math.random() * 100, Math.random() * 100, 2, 2);
            }

            // 시드 값에 따라 다른 패턴 그리기
            const pattern = seed % 5;
            ctx.fillStyle = category.colors[seed % category.colors.length];
            
            switch(pattern) {
                case 0: // 원들
                    for (let i = 0; i < 5 + (seed % 3); i++) {
                        ctx.beginPath();
                        ctx.arc(20 + (i * 15), 50, 10 + (seed % 8), 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;
                case 1: // 사각형들
                    for (let i = 0; i < 4 + (seed % 3); i++) {
                        ctx.fillRect(10 + (i * 20), 30 + (seed % 20), 15, 15 + (seed % 10));
                    }
                    break;
                case 2: // 삼각형들
                    for (let i = 0; i < 4; i++) {
                        ctx.beginPath();
                        ctx.moveTo(15 + (i * 20), 80);
                        ctx.lineTo(25 + (i * 20), 30);
                        ctx.lineTo(35 + (i * 20), 80);
                        ctx.closePath();
                        ctx.fill();
                    }
                    break;
                case 3: // 선들
                    for (let i = 0; i < 8 + (seed % 5); i++) {
                        ctx.beginPath();
                        ctx.moveTo(0, i * 12);
                        ctx.lineTo(100, i * 12 + (seed % 10));
                        ctx.strokeStyle = category.colors[(i + seed) % category.colors.length];
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    break;
                case 4: // 점들
                    for (let i = 0; i < 30 + (seed % 20); i++) {
                        ctx.beginPath();
                        ctx.arc(Math.random() * 100, Math.random() * 100, 3 + (seed % 5), 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;
            }

            // 이모지 오버레이 (선택사항 - 실제 객체를 암시)
            if (seed === gameState.correctCells[0] || gameState.correctCells.includes(seed)) {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(category.emoji, 50, 50);
            }

            return canvas.toDataURL();
        }

        // 게임 초기화
        function initGame() {
            gameState.health = 100;
            gameState.stage = 1;
            updateHealthBar();
            startStage();
        }

        // 새 스테이지 시작
        function startStage() {
            gameState.isProcessing = false;
            gameState.selectedCells = [];
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').textContent = '';
            document.getElementById('verifyBtn').disabled = false;
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('gameOver').style.display = 'none';

            // 랜덤 카테고리 선택
            const categoryIndex = Math.floor(Math.random() * categories.length);
            gameState.targetCategory = categories[categoryIndex];

            // 지시문 업데이트
            document.getElementById('instruction').textContent = 
                `🔍 "${gameState.targetCategory.name}"가 있는 칸을 모두 선택하세요!`;
            document.getElementById('stageNum').textContent = gameState.stage;

            // 정답 셀 결정 (1-3개)
            const numCorrect = Math.floor(Math.random() * 3) + 1;
            gameState.correctCells = [];
            while (gameState.correctCells.length < numCorrect) {
                const cell = Math.floor(Math.random() * 9);
                if (!gameState.correctCells.includes(cell)) {
                    gameState.correctCells.push(cell);
                }
            }

            // 그리드 생성
            createGrid();
        }

        // 그리드 생성
        function createGrid() {
            const grid = document.getElementById('captchaGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                cell.onclick = () => toggleCell(i);

                const img = document.createElement('img');
                img.className = 'cell-content';
                img.src = generateCellImage(gameState.targetCategory, i);
                img.alt = `Cell ${i + 1}`;

                cell.appendChild(img);
                grid.appendChild(cell);
            }
        }

        // 셀 토글
        function toggleCell(index) {
            if (gameState.isProcessing) return;

            const cells = document.querySelectorAll('.grid-cell');
            const cell = cells[index];

            if (gameState.selectedCells.includes(index)) {
                gameState.selectedCells = gameState.selectedCells.filter(i => i !== index);
                cell.classList.remove('selected');
            } else {
                gameState.selectedCells.push(index);
                cell.classList.add('selected');
            }
        }

        // 선택 검증
        function verifySelection() {
            if (gameState.isProcessing) return;
            if (gameState.selectedCells.length === 0) {
                showFeedback('최소 하나의 칸을 선택해주세요!', 'error');
                return;
            }

            gameState.isProcessing = true;
            document.getElementById('verifyBtn').disabled = true;

            // 정답/오답 확인
            const correctSelection = gameState.correctCells.every(c => gameState.selectedCells.includes(c)) &&
                                    gameState.selectedCells.every(s => gameState.correctCells.includes(s));

            // 시각적 피드백 표시
            const cells = document.querySelectorAll('.grid-cell');
            
            gameState.correctCells.forEach(index => {
                cells[index].classList.add('correct');
            });

            gameState.selectedCells.forEach(index => {
                if (!gameState.correctCells.includes(index)) {
                    cells[index].classList.add('wrong');
                }
            });

            if (correctSelection) {
                // 정답
                showFeedback('✅ 정답입니다! 다음 스테이지로 이동합니다.', 'success');
                setTimeout(() => {
                    gameState.stage++;
                    startStage();
                }, 1500);
            } else {
                // 오답 - 체력 감소
                const wrongCount = gameState.selectedCells.filter(s => !gameState.correctCells.includes(s)).length;
                const missedCount = gameState.correctCells.filter(c => !gameState.selectedCells.includes(c)).length;
                const damage = (wrongCount + missedCount) * 15;

                gameState.health = Math.max(0, gameState.health - damage);
                updateHealthBar();

                showFeedback(`❌ 오답입니다! ${damage}% 피해 (${wrongCount}개 잘못선택, ${missedCount}개 놓침)`, 'error');

                setTimeout(() => {
                    if (gameState.health <= 0) {
                        gameOver();
                    } else {
                        startStage();
                    }
                }, 2000);
            }
        }

        // 피드백 표시
        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
        }

        // 체력바 업데이트
        function updateHealthBar() {
            const healthBar = document.getElementById('healthBar');
            const healthNum = document.getElementById('healthNum');
            healthBar.style.width = `${gameState.health}%`;
            healthNum.textContent = gameState.health;

            // 체력에 따른 색상 변경
            if (gameState.health > 60) {
                healthBar.style.background = 'linear-gradient(90deg, #1dd1a1, #48dbfb)';
            } else if (gameState.health > 30) {
                healthBar.style.background = 'linear-gradient(90deg, #feca57, #ff9f43)';
            } else {
                healthBar.style.background = 'linear-gradient(90deg, #ff6b6b, #ee5a24)';
            }
        }

        // 게임 오버
        function gameOver() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalStage').textContent = gameState.stage;
        }

        // 게임 재시작
        function restartGame() {
            initGame();
        }

        // 게임 시작
        initGame();
    </script>
</body>
</html>
